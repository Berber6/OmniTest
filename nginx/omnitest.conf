# OmniTest Nginx 反向代理配置
# 安装 nginx 后，将此文件复制到 /etc/nginx/sites-available/omnitest
# 然后: sudo ln -s /etc/nginx/sites-available/omnitest /etc/nginx/sites-enabled/
# 最后: sudo nginx -t && sudo systemctl reload nginx

upstream frontend {
    server 127.0.0.1:3000;
}

upstream backend {
    server 127.0.0.1:8000;
}

server {
    listen 8080;
    server_name _;

    # --- 前端页面 ---
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR (Hot Module Replacement) WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- 后端 API ---
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长请求支持（执行可能持续数分钟）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # 大请求体（mutation 场景等）
        client_max_body_size 10m;
    }

    # --- 截图文件直接从磁盘 serve（比走 FastAPI 更快）---
    # 后端截图存储在 /data1/workspace/zhibin/omni_test/backend/data/screenshots/
    location /screenshots/ {
        alias /data1/workspace/zhibin/omni_test/backend/data/screenshots/;
        expires 7d;
        add_header Cache-Control "public, immutable";

        # 只允许 PNG/JPG
        location ~* \.(png|jpg|jpeg)$ {
            try_files $uri =404;
        }
        return 403;
    }

    # --- WebSocket ---
    location /ws/ {
        proxy_pass http://backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 长连接
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Favicon & 静态资源 ---
    location /favicon.svg {
        proxy_pass http://frontend/favicon.svg;
    }

    # --- Gzip 压缩 ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}